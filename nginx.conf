upstream frappe-server {
    server 127.0.0.1:8000 fail_timeout=0;
}

map $host $frappe_site {
    default $host;
    "~*localhost(:\d+)?$" "bench-manager.local";
    "~*127\.0\.0\.1(:\d+)?$" "bench-manager.local";
}

upstream socketio-server {
    server 127.0.0.1:9000 fail_timeout=0;
}

server {
    listen 8080;
    server_name _;

    root /home/frappe/frappe-bench/sites;

    # ── Buffer tuning ────────────────────────────────────────
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Hide server version ──────────────────────────────────
    server_tokens off;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Rate limiting zones (defined in http context via include) ──
    # If you need rate limiting, add to /etc/nginx/conf.d/rate-limit.conf:
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # Then uncomment: limit_req zone=api burst=50 nodelay;

    # ── Static assets with cache ─────────────────────────────
    location /assets {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Protected files ──────────────────────────────────────
    location ~ ^/protected/(.*) {
        internal;
        try_files /$host/$1 =404;
    }

    # ── WebSocket (Socket.IO) ────────────────────────────────
    location /socket.io {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Origin $scheme://$http_host;
        proxy_set_header Host $http_host;
        proxy_pass http://socketio-server;
    }

    # ── VS Code Server proxy ────────────────────────────────
    location ~ ^/vscode/([0-9]+)/(.*)$ {
        resolver 127.0.0.1;
        proxy_pass http://127.0.0.1:$1/$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Main application proxy ───────────────────────────────
    location / {
        rewrite ^(.+)/$ $1 permanent;
        rewrite ^(.+)/index\.html$ $1 permanent;
        rewrite ^(.+)\.html$ $1 permanent;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Frappe-Site-Name $frappe_site;

        proxy_set_header Host $http_host;
        proxy_set_header X-Use-X-Accel-Redirect True;
        proxy_read_timeout 120;
        proxy_redirect off;

        proxy_pass http://frappe-server;
    }

    # ── @webserver fallback ──────────────────────────────────
    location @webserver {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Frappe-Site-Name $frappe_site;

        proxy_set_header Host $http_host;
        proxy_set_header X-Use-X-Accel-Redirect True;
        proxy_read_timeout 120;
        proxy_redirect off;

        proxy_pass http://frappe-server;
    }

    # ── File upload endpoint (longer timeout) ────────────────
    location /api/method/upload_file {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Frappe-Site-Name $frappe_site;

        proxy_set_header Host $http_host;
        proxy_set_header X-Use-X-Accel-Redirect True;
        proxy_read_timeout 300;
        proxy_redirect off;

        proxy_pass http://frappe-server;
    }

    # ── Request size limits ──────────────────────────────────
    client_max_body_size 50m;
    client_body_buffer_size 16K;

    # ── Block sensitive paths ────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(sql|bak|tar|gz|log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
