name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

env:
  DOCKER_IMAGE: messitebi/bench-manager

jobs:
  # -------------------------------------------------------------
  # CI: Lint and Validate
  # -------------------------------------------------------------
  ci:
    name: CI - Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Compile Python files (syntax check)
        run: python -m compileall bench_manager/

  # -------------------------------------------------------------
  # CD: Build and Push Docker Image
  # -------------------------------------------------------------
  cd:
    name: CD - Build & Push Docker Image
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
