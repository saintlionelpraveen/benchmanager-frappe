name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # -------------------------------------------------------------
  # CI: Basic Checks
  # -------------------------------------------------------------
  ci:
    name: Continuous Integration (Basic Checks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Basic Checks
        run: |
          echo "Running basic sanity checks..."
          # Example basic check: compile Python files to catch syntax errors
          python -m compileall bench_manager/

  # -------------------------------------------------------------
  # CD: Continuous Deployment (Requires Approval)
  # -------------------------------------------------------------
  cd:
    name: Continuous Deployment
    needs: ci
    # This triggers the approval process you set up in GitHub Environments
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Update this image name if your Docker Hub repo name is different
          tags: ${{ secrets.DOCKER_USERNAME }}/benchmanager-frappe:latest
