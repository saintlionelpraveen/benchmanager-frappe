<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bench Manager Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --border-color: #333333;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --accent-color: #ffffff;
            --accent-hover: #e0e0e0;
            --success-color: #4ade80;
            --error-color: #f87171;
            --input-bg: #2d2d2d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container {
            width: 64px;
            height: 64px;
            background-color: var(--text-primary);
            border-radius: 16px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
        }

        .logo-container svg {
            width: 40px;
            height: 40px;
            fill: var(--bg-color);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1);
        }

        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .hint {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .loading-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,0.2);
            border-top-color: var(--bg-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-message {
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .status-success {
            background-color: rgba(74, 222, 128, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .status-error {
            background-color: rgba(248, 113, 113, 0.1);
            color: var(--error-color);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }
        
        .redirect-countdown {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div class="header">
            <div class="logo-container">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19,3H5C3.89,3 3,3.89 3,5V19C3,20.1 3.9,21 5,21H19C20.1,21 21,20.1 21,19V5C21,3.89 20.1,3 19,3M19,19H5V5H19V19M17,17H7V15H17V17M17,13H7V11H17V13M17,9H7V7H17V9Z" />
                </svg>
            </div>
            <h1>Bench Manager</h1>
            <p class="subtitle">Production Deployment Setup</p>
        </div>

        <form id="setupForm">
            <div class="form-group">
                <label for="portInput">Application Port</label>
                <input type="number" id="portInput" name="port" min="1" max="65535" value="9001" required>
                <span class="hint">The port where Bench Manager will be accessible on this machine.</span>
            </div>

            <button type="submit" id="submitBtn">
                <span id="btnText">Deploy Application</span>
                <div class="loading-spinner" id="spinner"></div>
            </button>
        </form>

        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const port = document.getElementById('portInput').value;
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const statusMsg = document.getElementById('statusMessage');
            
            // UI Loading state
            btn.disabled = true;
            btnText.textContent = 'Deploying...';
            spinner.style.display = 'block';
            statusMsg.style.display = 'none';
            
            try {
                // Send port back to the shell script's python server
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ port: parseInt(port) })
                });
                
                if (response.ok) {
                    // Success state
                    btn.style.display = 'none';
                    document.getElementById('setupForm').style.display = 'none';
                    
                    statusMsg.className = 'status-message status-success';
                    statusMsg.style.display = 'block';
                    
                    const redirectUrl = `http://${window.location.hostname}:${port}`;
                    
                    statusMsg.innerHTML = `
                        Setup initiated successfully! Check your terminal for logs.<br><br>
                        <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin-top: 10px;">
                            <div class="loading-spinner" style="display:block; border-top-color:var(--success-color);"></div>
                            <span style="font-weight: 500;">Deploying... this may take 2-4 minutes</span>
                        </div>
                    `;
                    
                    // Poll the container to see when it's up
                    const checkHealth = async () => {
                        try {
                            // no-cors fetch will succeed (opaque response) if the server is accepting connections
                            await fetch(redirectUrl + '/api/method/ping', { mode: 'no-cors' });
                            
                            statusMsg.innerHTML = `Setup complete!<br>Redirecting...`;
                            window.location.href = redirectUrl;
                        } catch (e) {
                            // Connection refused/failed, keep polling
                            setTimeout(checkHealth, 3000);
                        }
                    };
                    
                    // Give it 10 seconds before we start polling
                    setTimeout(checkHealth, 10000);
                } else {
                    throw new Error('Server responded with an error');
                }
            } catch (error) {
                // Error state
                btn.disabled = false;
                btnText.textContent = 'Deploy Application';
                spinner.style.display = 'none';
                
                statusMsg.textContent = 'Failed to communicate with setup script. Please check terminal.';
                statusMsg.className = 'status-message status-error';
                statusMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
