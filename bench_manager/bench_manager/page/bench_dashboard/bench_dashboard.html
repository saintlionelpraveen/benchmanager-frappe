<div class="bench-dashboard">
	<!-- Context Switcher Header -->
	<div class="bench-header-bar">
		<div class="bench-context-selector">
			<label>Current Context</label>
			<select id="bench-context-select">
				<option value="default">Loading...</option>
			</select>
		</div>
		<div class="bench-header-actions">
			<button class="btn btn-default btn-sm" id="btn-add-new-bench">
				<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
				Add New Bench
			</button>
		</div>
	</div>

	<!-- Status Bar -->
	<div class="bench-status-bar">
		<div class="status-item">
			<span class="status-icon benches-icon">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
			</span>
			<div class="status-info">
				<span class="status-label">Total Benches</span>
				<span class="status-value" id="status-benches-count">—</span>
			</div>
		</div>
		<div class="status-item">
			<span class="status-icon sites-icon">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
			</span>
			<div class="status-info">
				<span class="status-label">Active Sites</span>
				<span class="status-value" id="status-sites-count">—</span>
			</div>
		</div>
		<div class="status-item">
			<span class="status-icon apps-icon">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
			</span>
			<div class="status-info">
				<span class="status-label">Total Apps</span>
				<span class="status-value" id="status-apps-count">—</span>
			</div>
		</div>
	</div>

	<!-- Tab Navigation -->
	<div class="bench-main-layout">
		<div class="bench-tabs">
			<button class="bench-tab active" data-tab="benches">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
				Benches
			</button>
			<button class="bench-tab" data-tab="sites">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
				Sites
			</button>
			<button class="bench-tab" data-tab="apps">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
				Apps
			</button>
			<button class="bench-tab" data-tab="bench">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
				Bench Info
			</button>
			<button class="bench-tab" data-tab="logs">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
				Logs
			</button>

			<div class="flying-airplane-container">
				<img src="/assets/bench_manager/images/empty_sites.png" alt="Flying Airplane" class="flying-airplane-img">
			</div>
		</div>

	<!-- Bench Context Indicator -->
	<div class="bench-context-indicator" id="bench-context-indicator" style="display:none;">
		<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
		<span>Operating on: <strong id="bench-context-name"></strong></span>
	</div>

	<!-- Tab Content -->
	<div class="bench-tab-content">
		<!-- Benches Tab -->
		<div class="tab-pane active" id="tab-benches">
			<div class="tab-actions">
				<h3 class="tab-actions-heading">Registered Benches</h3>
				<button class="btn btn-primary btn-sm" id="btn-init-bench">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
					Initialize New Bench
				</button>
			</div>
			<div class="bench-table-wrapper" id="benches-table-wrapper">
				<div class="loading-placeholder">Loading benches...</div>
			</div>
		</div>

		<!-- Sites Tab -->
		<div class="tab-pane" id="tab-sites">
			<div class="tab-actions">
				<button class="btn btn-primary btn-sm" id="btn-new-site">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
					New Site
				</button>
				<button class="btn btn-default btn-sm" id="btn-refresh-sites">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
					Refresh
				</button>
			</div>
			<div class="bench-table-wrapper" id="sites-table-wrapper">
				<div class="loading-placeholder">Loading sites...</div>
			</div>
		</div>

		<!-- Apps Tab -->
		<div class="tab-pane" id="tab-apps">
			<div class="tab-actions">
				<button class="btn btn-primary btn-sm" id="btn-new-app">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
					New App
				</button>
				<button class="btn btn-default btn-sm" id="btn-refresh-apps">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
					Refresh
				</button>
			</div>
			<!-- App Category Filter Chips -->
			<div class="app-category-filters" id="app-category-filters">
				<button class="app-filter-chip active" data-filter="all">
					<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
					All Apps
				</button>
				<button class="app-filter-chip" data-filter="custom">
					<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
					Custom Apps
				</button>
				<button class="app-filter-chip" data-filter="git">
					<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
					Git Apps
				</button>
				<button class="app-filter-chip" data-filter="frappe_store">
					<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 7v11a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-3-5z"/><line x1="3" y1="7" x2="21" y2="7"/><path d="M16 11a4 4 0 0 1-8 0"/></svg>
					Frappe Store
				</button>
			</div>
			<div class="bench-table-wrapper" id="apps-table-wrapper">
				<div class="loading-placeholder">Loading apps...</div>
			</div>
		</div>

		<!-- Bench Info Tab -->
		<div class="tab-pane" id="tab-bench">
			<div class="bench-info-grid">
				<div class="info-card" id="card-versions">
					<div class="info-card-header">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
						<h3>Version Info</h3>
					</div>
					<div class="info-card-body" id="version-info">
						<div class="loading-placeholder">Loading...</div>
					</div>
				</div>
				<div class="info-card" id="card-actions">
					<div class="info-card-header">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
						<h3>Quick Actions</h3>
					</div>
					<div class="info-card-body">
						<button class="btn btn-primary btn-sm btn-block bench-action-btn" id="btn-bench-update">
							<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
							Update Bench
						</button>
						<button class="btn btn-default btn-sm btn-block bench-action-btn" id="btn-bench-migrate">
							<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
							Migrate All Sites
						</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Logs Tab -->
		<div class="tab-pane" id="tab-logs">
			<div class="tab-actions">
				<button class="btn btn-default btn-sm" id="btn-refresh-logs">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
					Refresh
				</button>
				<button class="btn btn-danger btn-sm" id="btn-clear-logs">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
					Clear Logs
				</button>
			</div>
			<div class="bench-table-wrapper" id="logs-table-wrapper">
				<div class="loading-placeholder">Loading logs...</div>
			</div>
		</div>
		</div>
	</div>
</div>
