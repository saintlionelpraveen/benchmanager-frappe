[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
pidfile=/var/run/supervisord.pid
user=root

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0760
chown=root:frappe

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[group:frappe]
programs=frappe-web,frappe-socketio,frappe-worker-long,frappe-worker-short,frappe-scheduler

# ── MariaDB ──────────────────────────────────────────────────
[program:mariadb]
command=/usr/sbin/mariadbd --user=mysql --datadir=/var/lib/mysql --skip-grant-tables=false
autostart=true
autorestart=true
startsecs=10
startretries=5
priority=10
stopwaitsecs=30
stopsignal=TERM
stdout_logfile=/var/log/supervisor/mariadb.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2
stderr_logfile=/var/log/supervisor/mariadb-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=2

# ── Redis ────────────────────────────────────────────────────
[program:redis]
command=/usr/bin/redis-server --bind 127.0.0.1 --port 6379 --save "" --maxmemory 256mb --maxmemory-policy allkeys-lru --protected-mode yes --loglevel warning
autostart=true
autorestart=true
startsecs=5
startretries=5
priority=10
user=redis
stopwaitsecs=10
stopsignal=TERM
stdout_logfile=/var/log/supervisor/redis.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=2
stderr_logfile=/var/log/supervisor/redis-error.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=2

# ── Frappe Web (Gunicorn) ────────────────────────────────────
[program:frappe-web]
command=/home/frappe/frappe-bench/env/bin/gunicorn --chdir=/home/frappe/frappe-bench/sites --bind=0.0.0.0:8000 --threads=4 --workers=2 --worker-class=gthread --worker-tmp-dir=/dev/shm --timeout=120 --graceful-timeout=30 --keep-alive=5 --max-requests=1000 --max-requests-jitter=50 --reload --reload-extra-file /home/frappe/frappe-bench/sites/apps.txt frappe.app:application
directory=/home/frappe/frappe-bench/sites
autostart=true
autorestart=true
startsecs=10
startretries=5
priority=30
user=frappe
environment=HOME="/home/frappe",USER="frappe"
stopwaitsecs=30
stopsignal=TERM
stdout_logfile=/var/log/supervisor/frappe-web.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/supervisor/frappe-web-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

# ── Frappe Socket.IO ─────────────────────────────────────────
[program:frappe-socketio]
command=node /home/frappe/frappe-bench/apps/frappe/socketio.js
directory=/home/frappe/frappe-bench/sites
autostart=true
autorestart=true
startsecs=5
startretries=5
priority=30
user=frappe
environment=HOME="/home/frappe",USER="frappe"
stopwaitsecs=15
stopsignal=TERM
stdout_logfile=/var/log/supervisor/frappe-socketio.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=2
stderr_logfile=/var/log/supervisor/frappe-socketio-error.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=2

# ── Frappe Worker (Long + Default + Short) ───────────────────
[program:frappe-worker-long]
command=/home/frappe/frappe-bench/env/bin/python -m frappe.utils.bench_helper frappe worker --queue long,default,short
directory=/home/frappe/frappe-bench/sites
autostart=true
autorestart=true
startsecs=5
startretries=5
priority=30
user=frappe
environment=HOME="/home/frappe",USER="frappe"
stopwaitsecs=60
stopsignal=TERM
stdout_logfile=/var/log/supervisor/frappe-worker-long.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2
stderr_logfile=/var/log/supervisor/frappe-worker-long-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=2

# ── Frappe Worker (Short + Default) ──────────────────────────
[program:frappe-worker-short]
command=/home/frappe/frappe-bench/env/bin/python -m frappe.utils.bench_helper frappe worker --queue short,default
directory=/home/frappe/frappe-bench/sites
autostart=true
autorestart=true
startsecs=5
startretries=5
priority=30
user=frappe
environment=HOME="/home/frappe",USER="frappe"
stopwaitsecs=30
stopsignal=TERM
stdout_logfile=/var/log/supervisor/frappe-worker-short.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=2
stderr_logfile=/var/log/supervisor/frappe-worker-short-error.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=2

# ── Frappe Scheduler ─────────────────────────────────────────
[program:frappe-scheduler]
command=/home/frappe/frappe-bench/env/bin/python -m frappe.utils.bench_helper frappe schedule
directory=/home/frappe/frappe-bench/sites
autostart=true
autorestart=true
startsecs=5
startretries=5
priority=30
user=frappe
environment=HOME="/home/frappe",USER="frappe"
stopwaitsecs=15
stopsignal=TERM
stdout_logfile=/var/log/supervisor/frappe-scheduler.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=2
stderr_logfile=/var/log/supervisor/frappe-scheduler-error.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=2

# ── Nginx ────────────────────────────────────────────────────
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
startsecs=5
startretries=5
priority=40
stopwaitsecs=10
stopsignal=QUIT
stdout_logfile=/var/log/supervisor/nginx.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=2
stderr_logfile=/var/log/supervisor/nginx-error.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=2
